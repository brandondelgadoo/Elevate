<!doctype html>
<html lang="en">
  <head>
    <title>Elevate | Community Skill Sharing</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO Meta -->
    <meta
      name="description"
      content="Elevate is a community skill-sharing platform where people teach and learn from each other."
    />

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <!-- ================= NAVIGATION ================= -->
    <div id="site-navbar"></div>

    <!-- ================= HERO SECTION ================= -->
    <div class="hero-container">
      <h2>Learn Something New. Teach What You Know.</h2>
      <p>
        Connect with your community through real skills and real experiences.
      </p>
      <button class="btn-primary">Get Started</button>
    </div>

    <!-- ================= FEATURED SKILL LISTINGS ================= -->
    <div class="featured-listings-container">
      <h3>Featured Skills</h3>

      <div class="card-grid" id="skillsContainer">
        <!-- Skill cards will be inserted here dynamically with JS later -->

        <!-- Example Static Card -->
        <div class="skill-card">
          <h4>Intro to Web Development</h4>
          <p>Learn HTML, CSS, and JavaScript fundamentals.</p>
          <span class="category-tag">Technology</span>
        </div>
      </div>
    </div>

    <!-- ================= FOOTER ================= -->
    <footer>
      <div class="footer-container">
        <p>&copy; 2026 Elevate. All rights reserved.</p>
      </div>
    </footer>

    <!-- ================= DIALOG ================= -->
    <dialog id="skillDialog">
      <h2 id="dialogTitle"></h2>
      <p id="dialogDescription"></p>
      <button id="closeDialog">Close</button>
    </dialog>

    <!-- ================= JAVASCRIPT ================= -->
    <script src="js/navigation.js" defer></script>
    <script src="js/skills.js" defer></script>
    <script src="js/app.js" defer></script>
  </body>
</html>
