<!doctype html>
<html lang="en">

<head>
  <title>Elevate | Community Skill Sharing</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Elevate is a community skill-sharing platform where people teach and learn from each other." />
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Instrument+Serif&display=swap" rel="stylesheet">
  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <!-- ================= HERO SECTION (navbar lives inside) ================= -->
  <section class="hero">

    <!-- Background gradient -->
    <div class="hero-bg">
      <svg fill="none" preserveAspectRatio="none" viewBox="0 0 800 680">
        <path d="M800 0H0V680H800V0Z" fill="url(#hg)" />
        <defs>
          <linearGradient gradientUnits="userSpaceOnUse" id="hg" x1="400" x2="400" y1="0" y2="680">
            <stop offset="0.3125" stop-color="#020817" />
            <stop offset="1" stop-color="#5F7AC7" />
          </linearGradient>
        </defs>
      </svg>
    </div>

    <!-- Aurora glow effects -->
    <div class="aurora-wrap">
      <div class="aurora-inner">
        <svg fill="none" preserveAspectRatio="none" viewBox="0 0 1510 1390">
          <g filter="url(#af)" opacity="0.4">
            <circle cx="410" cy="410" r="250" fill="url(#ar1)" />
            <circle cx="1050" cy="930" r="300" fill="url(#ar2)" />
            <circle cx="780" cy="690" r="175" fill="url(#ar3)" />
          </g>
          <defs>
            <filter id="af" x="0" y="0" width="1510" height="1390" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
              <feGaussianBlur stdDeviation="80" />
            </filter>
            <radialGradient id="ar1" cx="410" cy="410" r="250" gradientUnits="userSpaceOnUse">
              <stop stop-color="#5EEAD4" />
              <stop offset="1" stop-color="#5EEAD4" stop-opacity="0" />
            </radialGradient>
            <radialGradient id="ar2" cx="1050" cy="930" r="300" gradientUnits="userSpaceOnUse">
              <stop stop-color="#818CF8" />
              <stop offset="1" stop-color="#818CF8" stop-opacity="0" />
            </radialGradient>
            <radialGradient id="ar3" cx="780" cy="690" r="175" gradientUnits="userSpaceOnUse">
              <stop stop-color="#F472B6" />
              <stop offset="1" stop-color="#F472B6" stop-opacity="0" />
            </radialGradient>
          </defs>
        </svg>
      </div>
    </div>

    <!-- ================= NAVIGATION — mounted by navigation.js ================= -->
    <div id="site-navbar"></div>

    <!-- Hero content -->
    <div class="hero-container">
      <div class="eyebrow">
        <div class="eyebrow-line eyebrow-line-left"></div>
        <span class="eyebrow-text">Community</span>
        <div class="eyebrow-line eyebrow-line-right"></div>
      </div>
      <h2>Learn Something New. Teach What You Know.</h2>
      <p>Connect with your community through real skills and real experiences.</p>
      <div class="hero-actions">
        <button class="btn-primary btn-hero" id="getStartedButton" type="button">Get Started</button>
        <a class="btn-primary btn-hero" href="request.html">Request a Skill</a>
      </div>
    </div>
  </section>

  <!-- ================= FEATURED SKILL LISTINGS ================= -->
  <div class="listings-container">
    <div class="container">
      <div class="skills-header">
        <div>
          <h3>Featured Skills</h3>
          <p>Explore top-rated skills and start learning today.</p>
        </div>
      </div>
      <div class="card-grid" id="skillsContainer">
        <!-- Skill cards inserted dynamically by skills.js -->
      </div>
    </div>
  </div>

  <!-- ================= FOOTER ================= -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <p class="footer-copy">&copy; 2026 Elevate. All rights reserved.</p>
        <div class="footer-links">
          <a href="about.html">About</a>
          <a href="explore.html">Explore</a>
          <a href="request.html">Request</a>
        </div>
      </div>
    </div>
  </footer>

  <!-- ================= DIALOG ================= -->
  <dialog id="skillDialog">
    <img id="dialogImage" alt="" hidden>
    <h2 id="dialogTitle"></h2>
    <p id="dialogCreatedBy"></p>
    <p id="dialogCategory"></p>
    <p id="dialogSessionDetails"></p>
    <div id="dialogAvailableDates"></div>
    <p id="dialogDescription"></p>
    <button id="closeDialog">Close</button>
  </dialog>

  <!-- ================= JAVASCRIPT ================= -->
  <script type="module" src="js/navigation.js"></script>
  <script src="js/skills.js" defer></script>
  <script type="module" src="js/app.js"></script>

</body>
</html>
