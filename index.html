<!doctype html>
<html lang="en">

<head>
  <title>Elevate | Community Skill Sharing</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- SEO Meta -->
  <meta name="description"
    content="Elevate is a community skill-sharing platform where people teach and learn from each other." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Dosis:wght@400;500;600;700&family=Instrument+Serif&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <section class="hero-shell">
    <!-- ================= NAVIGATION ================= -->
    <div id="site-navbar"></div>

    <!-- ================= HERO SECTION ================= -->
    <div class="hero-container">
      <div class="eyebrow">
        <div class="eyebrow-line eyebrow-line-left"></div>
        <span class="eyebrow-text">Community</span>
        <div class="eyebrow-line eyebrow-line-right"></div>
      </div>
      <h2>
        Learn Something New.
        <br>
        Teach What You Know.
      </h2>
      <p>
        Connect with your community through real skills and real experiences.
      </p>
      <button class="btn-primary" id="getStartedButton" type="button">Get Started</button>
    </div>
  </section>

  <!-- ================= FEATURED SKILL LISTINGS ================= -->
  <div class="featured-listings-container">
    <h3>Featured Skills</h3>
    <p>Explore standout community skills and jump into learning faster.</p>

    <div class="card-grid" id="skillsContainer">
      <!-- Skill cards will be inserted here dynamically with JS later -->
    </div>
  </div>

  <!-- ================= FOOTER ================= -->
  <footer>
    <div class="footer-container">
      <p>&copy; 2026 Elevate. All rights reserved.</p>
    </div>
  </footer>

  <!-- ================= JAVASCRIPT ================= -->
  <script type="module" src="js/navigation.js"></script>
  <script src="js/skills.js" defer></script>
  <script type="module" src="js/app.js"></script>

</body>

</html>
