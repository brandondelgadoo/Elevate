<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elevate | Explore</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Instrument+Serif&display=swap" rel="stylesheet">
  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <!-- ================= NAVIGATION ================= -->
  <div id="site-navbar"></div>

  <!-- ================= EXPLORE PAGE ================= -->
  <div class="explore-page">
    <div class="explore-hero">
      <p class="explore-eyebrow">Discover Community Skills</p>
      <h2>Browse skill posts from people ready to teach what they know.</h2>
      <p class="explore-subtitle">
        Use search, filters, and sorting to narrow down the skills that
        fit what you want to learn.
      </p>
    </div>

    <div class="explore-toolbar" aria-label="Explore skill tools">
      <div class="explore-search-area">
        <label for="exploreSearchInput">Search skills</label>
        <div class="explore-search-input-group">
          <input type="text" id="exploreSearchInput" placeholder="Search by skill, topic, or teacher" />
          <button type="button" class="btn-primary" id="exploreSearchButton">
            Search
          </button>
        </div>
      </div>

      <div class="explore-filter-area">
        <div class="explore-filter-group">
          <span>Category</span>
          <div class="explore-category-options" id="exploreCategoryFilter">
            <label class="explore-category-option">
              <input type="checkbox" value="tech" />
              <span>Technology</span>
            </label>
            <label class="explore-category-option">
              <input type="checkbox" value="fitness" />
              <span>Fitness</span>
            </label>
            <label class="explore-category-option">
              <input type="checkbox" value="music" />
              <span>Music</span>
            </label>
            <label class="explore-category-option">
              <input type="checkbox" value="art" />
              <span>Art</span>
            </label>
          </div>
        </div>

        <div class="explore-filter-group">
          <label for="exploreSort">Sort by</label>
          <select id="exploreSort">
            <option value="id-desc">Newest First</option>
            <option value="id-asc">Oldest First</option>
            <option value="title-asc">Title A-Z</option>
            <option value="title-desc">Title Z-A</option>
            <option value="creator-asc">Instructor A-Z</option>
            <option value="creator-desc">Instructor Z-A</option>
          </select>
        </div>

        <div class="explore-filter-group">
          <button type="button" class="btn-primary" id="clearExploreFiltersButton">
            Clear Filters
          </button>
        </div>
      </div>
    </div>

    <div class="explore-results">
      <div class="explore-results-header">
        <h3>All Skill Posts</h3>
        <p id="exploreResultsCount">Loading skill posts...</p>
      </div>

      <div class="card-grid" id="cardGrid" aria-live="polite">
        <!-- Skill cards render here from the current post data source. -->
      </div>
    </div>
  </div>

  <!-- ================= FOOTER ================= -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <p class="footer-copy">&copy; 2026 Elevate. All rights reserved.</p>
        <div class="footer-links">
          <a href="about.html">About</a>
          <a href="explore.html">Explore</a>
          <a href="request.html">Request</a>
        </div>
      </div>
    </div>
  </footer>

  <!-- ================= DIALOG ================= -->
  <dialog id="skillDialog">
    <img id="dialogImage" alt="" hidden>
    <h2 id="dialogTitle"></h2>
    <p id="dialogCreatedBy"></p>
    <p id="dialogCategory"></p>
    <p id="dialogSessionDetails"></p>
    <div id="dialogAvailableDates"></div>
    <p id="dialogDescription"></p>
    <div id="dialogBookingSection">
      <label for="bookingDateSelect">Choose a session date</label>
      <select id="bookingDateSelect"></select>
      <p id="bookingStatusMessage" aria-live="polite"></p>
      <button id="bookSessionButton" type="button">Book Session</button>
    </div>
    <button id="closeDialog">Close</button>
  </dialog>

  <!-- ================= JAVASCRIPT ================= -->
  <script type="module" src="js/navigation.js"></script>
  <script src="js/skills.js" defer></script>
  <script type="module" src="js/explore.js"></script>
  <script src="js/explore-filters.js" defer></script>
</body>

</html>
