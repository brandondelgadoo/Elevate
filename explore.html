<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Explore | Elevate</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- ================= NAVIGATION ================= -->
  <div id="site-navbar"></div>

  <!-- ================= EXPLORE PAGE ================= -->
  <div class="explore-page">
    <div class="explore-hero">
      <p class="explore-eyebrow">Discover Community Skills</p>
      <h2>Browse skill posts from people ready to teach what they know.</h2>
      <p class="explore-subtitle">Use search, filters, and sorting later to narrow down the skills that fit what you want to learn.</p>
    </div>

    <div class="explore-toolbar" aria-label="Explore skill tools">
      <div class="explore-search-area">
        <label for="exploreSearchInput">Search skills</label>
        <div class="explore-search-input-group">
          <input type="text" id="exploreSearchInput" placeholder="Search by skill, topic, or teacher">
          <button type="button" class="btn-primary" id="exploreSearchButton">Search</button>
        </div>
      </div>

      <div class="explore-filter-area">
        <div class="explore-filter-group">
          <label for="exploreCategoryFilter">Category</label>
          <select id="exploreCategoryFilter">
            <option value="">All Categories</option>
            <option value="technology">Technology</option>
            <option value="fitness">Fitness</option>
            <option value="music">Music</option>
            <option value="art">Art</option>
          </select>
        </div>

        <div class="explore-filter-group">
          <label for="exploreSort">Sort by</label>
          <select id="exploreSort">
            <option value="recent">Most Recent</option>
            <option value="popular">Most Popular</option>
            <option value="title">Title A-Z</option>
          </select>
        </div>
      </div>
    </div>

    <div class="explore-results">
      <div class="explore-results-header">
        <h3>All Skill Posts</h3>
        <p id="exploreResultsCount">Loading skill posts...</p>
      </div>

      <div class="card-grid" id="cardGrid" aria-live="polite">
        <!-- Skill cards render here from the current post data source. -->
      </div>
    </div>
  </div>

  
  <!-- ================= FOOTER ================= -->
  <footer>
    <div class="footer-container">
      <p>&copy; 2026 Elevate. All rights reserved.</p>
    </div>
  </footer>


  <!-- ================= JAVASCRIPT ================= -->
  <script src="js/navigation.js" defer></script>
  <script src="js/skills.js" defer></script>
  <script src="js/explore.js" defer></script>
  <script src="js/explore-filters.js" defer></script>
</body>

</html>
