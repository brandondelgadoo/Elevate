<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Elevate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Instrument+Serif&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth-dialog.css">
</head>

<body>

  <!-- ================= NAVIGATION ================= -->
  <div id="site-navbar"></div>


  <main class="auth-page-shell">
    <section class="auth-card">
      <p class="explore-eyebrow">Welcome Back</p>
      <h1>Login</h1>
      <p>Sign in to continue learning, teaching, and managing your community skills.</p>

      <form id="loginForm">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="loginBtn" type="button">Sign In</button>
        <p id="msgBox"></p>
      </form>

      <div class="auth-links">
        <p>Forgot password? <a href="#" id="forgotPasswordLink">Reset it</a></p>
        <p>No account? <a href="signup.html">Sign up</a></p>
      </div>
    </section>
  </main>


  <!-- ================= FORGOT PASSWORD DIALOG ================= -->
  <dialog id="forgotPasswordDialog" class="auth-dialog">
    <div class="auth-dialog__panel">
      <button type="button" id="dismissResetDialogBtn" class="auth-dialog__close"
        aria-label="Close reset password dialog">x</button>
    </div>
    <div class="auth-dialog__content">
      <h2>Reset Password</h2>
      <p>Enter your email and we will send you a password reset link.</p>
      <input type="email" id="resetEmail" placeholder="Email">
      <p id="resetMsgBox" class="auth-dialog__message"></p>
      <div class="auth-dialog__actions">
        <button type="button" id="sendResetBtn" class="btn-primary">Send Reset Email</button>
        <button type="button" id="closeResetDialogBtn">Close</button>
      </div>
    </div>
  </dialog>
  <!-- ================= FOOTER ================= -->
  <footer>
    <div class="footer-container">
      <p>&copy; 2026 <img src="images/logo.png" alt="Elevate" class="footer-logo" />. All rights reserved.</p>
    </div>
  </footer>


  <!-- ================= JAVASCRIPT ================= -->
  <script type="module" src="js/navigation.js"></script>
  <script type="module" src="js/login.js"></script>

</body>

</html>
